<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログイン・大吉CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
<style>
  body{ background:var(--app-bg); }
  .auth{ min-height:100vh; display:grid; grid-template-columns: 1.05fr .95fr; }
  .auth-brand{ background:
      radial-gradient(1200px 500px at -10% -10%, rgba(183,134,31,.18), transparent 50%),
      linear-gradient(160deg,var(--brand-900),var(--brand-700));
      color:#fff; padding:56px 56px; display:flex; flex-direction:column; }
  .auth-brand .seal{ width:52px;height:52px;border-radius:13px;background:var(--gold-500);color:#2a1c05;display:grid;place-items:center;font-weight:800;font-size:27px;}
  .auth-brand h1{ color:#fff; font-size:30px; margin-top:22px; line-height:1.3;}
  .auth-brand p{ color:#bcd2e4; max-width:420px; }
  .auth-brand .ledger{ margin-top:auto; border-left:3px solid var(--gold-500); padding-left:16px; color:#cfe0ef;}
  .auth-brand .ledger .chips{ margin-top:8px;}
  .auth-form{ display:grid; place-items:center; padding:30px;}
  .auth-card{ width:100%; max-width:380px; }
  .auth-card h2{ font-size:22px; }
  .auth-card .lead{ color:var(--ink-3); margin:6px 0 22px;}
  .auth-card .field{ margin-bottom:14px;}
  .auth-card .input{ height:42px; width:100%; }
  .auth-card .btn-primary{ width:100%; height:44px; font-size:14.5px; margin-top:6px;}
  .auth-card .row-between{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px;}
  @media (max-width:880px){ .auth{ grid-template-columns:1fr;} .auth-brand{ display:none;} }
</style>
</head>
<body>
  <div class="auth">
    <div class="auth-brand">
      <span class="seal">大</span>
      <h1>顧客を、つなぐ台帳。</h1>
      <p>顧問先・見込み客を一元管理し、求めること（needs）と提供できること（offers）から、顧客同士のビジネス紹介を見つけます。</p>
      <div class="ledger">
        <div style="font-weight:700;color:#fff;">求 ↔ 提 で縁を結ぶ</div>
        <div class="chips">
          <span class="chip need"><span class="mk">求</span>集客</span>
          <span class="match-conn" style="flex-direction:row;gap:4px;"><span class="arr" style="color:var(--gold-500)">↔</span></span>
          <span class="chip offer"><span class="mk">提</span>Web広告</span>
        </div>
      </div>
    </div>

    <div class="auth-form">
      <div class="auth-card">
        <h2>ログイン</h2>
        <div class="lead">大吉会計事務所 顧客管理システム</div>

        <div class="field">
          <label>メールアドレス</label>
          <input class="input" type="email" placeholder="you@daikichi-accg.co.jp" value="yamada@daikichi-accg.co.jp">
        </div>
        <div class="field">
          <div class="row-between"><label style="margin:0">パスワード</label><a href="#" onclick="toast('リセットメールを送信しました');return false;">パスワードを忘れた方</a></div>
          <input class="input" type="password" placeholder="••••••••" value="password" style="margin-top:6px;">
        </div>

        <button class="btn btn-primary" onclick="location.href='dashboard.html'">ログイン</button>

        <div class="banner info mt16" style="font-size:12px;">
          <span>アカウントは管理者が発行します（招待制）。サインアップは開放していません。</span>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
