<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アカウント・大吉CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" data-active="account"></aside>
  <div class="main">
    <header class="topbar">
      <button class="btn btn-icon hamb" data-icon="menu" aria-label="メニュー"></button>
      <h1>アカウント</h1>
      <div class="spacer"></div>
      <button class="btn btn-sm" data-icon="help" data-iw="15" onclick="openGuide('アカウントの使い方', document.getElementById('guide').innerHTML)">使い方</button>
      <div class="user"><div class="avatar">山</div></div>
    </header>

    <div class="content" style="max-width:720px;">
      <div id="guide" hidden>
        <p>自分のアカウント設定です。</p>
        <ul>
          <li>表示名の変更、<b>パスワード変更</b>、<b>ログアウト</b>。</li>
          <li>メールアドレスの変更は管理者へ依頼します。</li>
        </ul>
      </div>
      <div class="page-head"><div><h2>アカウント設定</h2><div class="sub">プロフィールとパスワードを管理します。</div></div></div>

      <div class="panel">
        <div class="panel-head"><h3>プロフィール</h3></div>
        <div class="panel-body">
          <div class="row" style="gap:16px;margin-bottom:16px;">
            <div class="avatar" style="width:56px;height:56px;font-size:20px;">山</div>
            <div>
              <div class="b" style="font-size:16px;">山田 健太</div>
              <div class="muted num">yamada@daikichi-accg.co.jp</div>
              <span class="badge prospect" style="margin-top:6px;">権限: 一般スタッフ</span>
            </div>
          </div>
          <div class="form-grid">
            <div class="field"><label>表示名</label><input class="input" value="山田 健太"></div>
            <div class="field"><label>メール</label><input class="input num" value="yamada@daikichi-accg.co.jp" disabled><span class="hint">変更は管理者へ依頼してください</span></div>
          </div>
          <div class="row mt16" style="justify-content:flex-end;"><button class="btn btn-primary" onclick="toast('プロフィールを保存しました')">保存</button></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h3>パスワード変更</h3></div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="field col-2"><label>現在のパスワード</label><input class="input" type="password" placeholder="••••••••"></div>
            <div class="field"><label>新しいパスワード</label><input class="input" type="password" placeholder="8文字以上"></div>
            <div class="field"><label>新しいパスワード（確認）</label><input class="input" type="password" placeholder="再入力"></div>
          </div>
          <div class="row mt16" style="justify-content:flex-end;"><button class="btn btn-primary" onclick="toast('パスワードを変更しました')">パスワードを変更</button></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-body row" style="justify-content:space-between;">
          <div><div class="b">ログアウト</div><div class="muted" style="font-size:12.5px;">この端末からサインアウトします。</div></div>
          <button class="btn btn-danger" onclick="demoModal('ログアウトしますか？','再度ログインが必要になります。','ログアウト')">ログアウト</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="assets/app.js"></script>
</body>
</html>
